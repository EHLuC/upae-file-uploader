<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upaê | Compartilhamento Rápido de Arquivos</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- 
      QRious é a lib que eu uso pra gerar QR codes.
      Carreguei ela de um CDN pra não precisar instalar nada localmente.
      O defer faz ela só carregar depois que o HTML todo já foi lido.
    -->
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js" defer></script>
    
    <!-- 
      Google Analytics G-2M86J6WW9T
      Coloquei isso pra saber quantas pessoas usam o site e de onde elas vêm.
      É útil pra eu entender se vale a pena continuar mantendo esse projeto.
    -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2M86J6WW9T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2M86J6WW9T');
    </script>

      Uso ele pra rastrear eventos específicos tipo "upload_success" ou "upload_failed".
      É mais detalhado que o Google Analytics pra eu entender o comportamento dos usuários.
      A key e as configs vêm do config.js que carrega do backend.
    -->

    <!-- 
      config.js carrega as variáveis de ambiente do backend.
      Ele faz um fetch no /.netlify/functions/config pra pegar cloudName e posthogKey
      sem expor esses valores no repositório público do GitHub.
    -->
    <script src="/config.js"></script>
    
    <!-- 
      Meus scripts principais do site.
      validation.js: valida tamanho e tipo de arquivo antes de fazer upload
      api-client.js: faz as chamadas pras APIs (Cloudinary, shorten, etc)
      ui-manager.js: mexe nos elementos da página (preview, QR code, status)
    -->
    <script src="/js/validation.js" defer></script>
    <script src="/js/api-client.js" defer></script>
    <script src="/js/ui-manager.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Upload Rápido de Arquivos</h1>
        <p class="subtitle">Compartilhe qualquer arquivo de forma simples e instantânea.</p>
        
        <!-- 
          Área de upload com drag and drop.
          O usuário pode arrastar um arquivo aqui ou clicar pra abrir o seletor.
          O JavaScript em ui-manager.js fica escutando os eventos de drop.
        -->
        <div class="upload-area" id="dropArea">
            <div class="upload-icon">📁</div>
            <p>Arraste e solte seu arquivo aqui ou clique para selecionar</p>
        </div>
        
        <!-- Input file escondido, acionado quando clica na área de upload -->
        <input type="file" id="fileInput" class="file-input">
        
        <p id="size-limit-text">*Limite de 10 MB por arquivo.</p>
        
        <!-- Loader e status ficam escondidos até o upload começar -->
        <div class="loader" id="loader"></div>
        <div class="status" id="status"></div>
        
        <!-- 
          Preview do arquivo enviado.
          Se for imagem, mostra a imagem. Se for outro tipo, mostra ícone e nome.
        -->
        <div class="preview-section" id="previewSection">
            <h2>Pré-visualização</h2>
            <img id="preview"/>
            <div id="filePreview">
                <span>📄</span>
                <p id="fileName"></p>
            </div>
        </div>
        
        <!-- QR Code gerado automaticamente com o link curto -->
        <div class="qr-section" id="qrSection">
            <h2>QR Code</h2>
            <canvas id="qr"></canvas>
        </div>
        
        <!-- Link curto final pra copiar e compartilhar -->
        <div class="result-section" id="resultSection">
            <h2>Seu link curto:</h2>
            <p id="link"></p>
            <button id="copyButton">Copiar Link</button>
        </div>
    </div>
    
    <!-- Rodapé com frases aleatórias carregadas pelo loadRandomFooter() -->
    <footer id="dynamic-footer"></footer>
    
    <!-- Script principal que orquestra todo o processo de upload -->
    <script src="/script.js" defer></script>
</body>
</html>
