# --- Configuração de Build ---
[build]
  functions = "netlify/functions"
  publish = "."

# --- Redirects ---
# Redireciono links curtos tipo /s/abc123 pra função que busca no banco
[[redirects]]
  from = "/s/:slug"
  to = "/.netlify/functions/redirect?slug=:slug"
  status = 302

# --- Security Headers ---
# Headers de segurança pra proteger contra XSS, clickjacking, etc
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"